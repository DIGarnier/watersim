name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast gate: format, and the headless build/test that drives the real
  # physics engine (no graphics system deps). This is what the optimization
  # work targets and what the unit tests + bench harness exercise.
  check:
    name: fmt + headless build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-headless-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-headless-

      - name: Format check
        run: cargo fmt --all --check

      - name: Build (headless)
        run: cargo build --release --no-default-features --benches

      - name: Test (headless)
        run: cargo test --release --no-default-features

      # Advisory: the pre-existing codebase carries clippy lints; surface new
      # ones without blocking the merge on the historical backlog.
      - name: Clippy (advisory)
        run: cargo clippy --no-default-features --benches || true

  # Compiles the actual ggez binary (src/main.rs) so the graphical front end
  # can't silently rot. Needs ALSA + udev headers (see BUILD.md).
  graphics-build:
    name: graphics build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: System deps (ggez)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-graphics-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-graphics-

      - name: Build (graphics feature)
        run: cargo build --release
